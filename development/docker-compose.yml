services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: zodb
      POSTGRES_PASSWORD: zodb
      POSTGRES_DB: zodb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zodb"]
      interval: 5s
      timeout: 3s
      retries: 5

  thumbor:
    build:
      context: ../../..
      dockerfile: sources/plone-pgthumbor/development/thumbor/Dockerfile
    environment:
      PGTHUMBOR_DSN: "dbname=zodb user=zodb password=zodb host=postgres"
      THUMBOR_SECURITY_KEY: "dev-secret-key"
      ALLOW_UNSAFE_URL: "True"
      # Auth subrequests go to Plone running on the host
      PGTHUMBOR_PLONE_AUTH_URL: "http://host.docker.internal:8081/Plone"
      PGTHUMBOR_AUTH_CACHE_TTL: "60"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - thumbor

volumes:
  pgdata:
