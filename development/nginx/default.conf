server {
    listen 80;

    # Thumbor image serving.
    # Strips the /thumbor/ prefix before forwarding to Thumbor.
    # The browser-facing URL is http://localhost:8080/thumbor/{hmac}/{ops}/...
    # Thumbor sees /{hmac}/{ops}/...
    location /thumbor/ {
        rewrite ^/thumbor/(.*)$ /$1 break;
        proxy_pass http://thumbor:8888;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Cookie is forwarded automatically — nginx passes all request headers
    }

    # Plone backend (running on host) with VirtualHostMonster.
    # $http_host includes the port (e.g. "localhost:8080") which VHM needs.
    # The Plone site is mounted at /Plone so it appears as the site root.
    location / {
        rewrite ^(.*)$ /VirtualHostBase/http/$http_host/Plone/VirtualHostRoot$1 break;
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_redirect http://host.docker.internal:8081/Plone/ /;
    }
}
