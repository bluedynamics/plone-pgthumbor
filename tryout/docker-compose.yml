services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: zodb
      POSTGRES_PASSWORD: zodb
      POSTGRES_DB: zodb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zodb"]
      interval: 5s
      timeout: 3s
      retries: 5

  thumbor:
    image: ghcr.io/bluedynamics/zodb-pgjsonb-thumborblobloader:latest
    environment:
      PGTHUMBOR_DSN: "dbname=zodb user=zodb password=zodb host=postgres"
      THUMBOR_SECURITY_KEY: "dev-secret-key"
      ALLOW_UNSAFE_URL: "True"
      PGTHUMBOR_PLONE_AUTH_URL: "http://plone:8080/Plone"
      PGTHUMBOR_AUTH_CACHE_TTL: "60"
    depends_on:
      postgres:
        condition: service_healthy

  plone:
    build: plone
    command: ["start"]
    environment:
      PGJSONB_DSN: "dbname=zodb user=zodb password=zodb host=postgres port=5432"
      SITE: "Plone"
      TYPE: "classic"
      PROFILES: "plone.pgcatalog:default,plone.pgthumbor:default"
      PGTHUMBOR_SERVER_URL: "http://localhost:8080/thumbor"
      PGTHUMBOR_SECURITY_KEY: "dev-secret-key"
    depends_on:
      postgres:
        condition: service_healthy
      thumbor:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - plone
      - thumbor

volumes:
  pgdata:
